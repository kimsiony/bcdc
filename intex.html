<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트수업 바로가기</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#38bdf8);
  min-height:100vh;
  color:#fff;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:28px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

.title{
  font-size:38px;
  font-weight:800;
}

.sub{
  opacity:.9;
}

.clock{
  background:rgba(255,255,255,.12);
  padding:12px 18px;
  border-radius:18px;
  backdrop-filter:blur(8px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  margin-top:28px;
}

.card{
  background:rgba(255,255,255,.14);
  padding:22px;
  border-radius:24px;
  text-decoration:none;
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  transition:.2s;
  border:1px solid rgba(255,255,255,.18);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
}

.emoji{
  font-size:38px;
}

.name{
  font-size:22px;
  font-weight:700;
  margin-top:10px;
}

.desc{
  opacity:.85;
  margin-top:8px;
}

.tools{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-top:26px;
}

.btn{
  background:#fff;
  color:#0f172a;
  padding:14px;
  border-radius:16px;
  text-align:center;
  font-weight:700;
  cursor:pointer;
}

footer{
  text-align:center;
  margin-top:30px;
  opacity:.85;
}
</style>
</head>

<body>
<div class="wrap">

  <!-- 헤더 -->
  <div class="header">
    <div>
      <div class="title">🏫 스마트수업 바로가기</div>
      <div class="sub">수업 자료 · 빠른 실행 · 공용 PC 최적화</div>
    </div>

    <div class="clock">
      <div id="date"></div>
      <div id="time" style="font-size:28px;font-weight:800"></div>
    </div>
  </div>

  <!-- 카드 -->
  <div class="grid">

    <a class="card" href="https://view.genially.com/69e986950abadc2446c7d65c" target="_blank">
      <div class="emoji">🎵</div>
      <div class="name">뮤직마스터</div>
      <div class="desc">음악 퀴즈/게임형 수업</div>
    </a>

    <a class="card" href="https://view.genially.com/69e9835d4100ff98ecb8aaf4" target="_blank">
      <div class="emoji">🪐</div>
      <div class="name">태양계를 구해라</div>
      <div class="desc">과학 탐험 미션</div>
    </a>

    <a class="card" href="https://view.genially.com/69e9a1944100ff98ecc42c43" target="_blank">
      <div class="emoji">🏛️</div>
      <div class="name">박물관 개관하기</div>
      <div class="desc">사회/역사 프로젝트</div>
    </a>

    <a class="card" href="https://www.google.com" target="_blank">
      <div class="emoji">🔎</div>
      <div class="name">검색 바로가기</div>
      <div class="desc">자료 즉시 검색</div>
    </a>

    <a class="card" href="https://edugames.uz/game/arqon/" target="_blank">
      <div class="emoji">🧮</div>
      <div class="name">수학 줄다리기</div>
      <div class="desc">게임으로 배우는 수학 대결</div>
    </a>

    <!-- 추가된 사이트 -->
    <a class="card" href="https://quickdraw.withgoogle.com/?locale=ko" target="_blank">
      <div class="emoji">✏️</div>
      <div class="name">Quick, Draw!</div>
      <div class="desc">AI 그림 맞추기 게임</div>
    </a>

  </div>

  <!-- 버튼 -->
  <div class="tools">
    <div class="btn" onclick="location.reload()">🔄 새로고침</div>
    <div class="btn" onclick="document.documentElement.requestFullscreen()">🖥️ 전체화면</div>
  </div>

  <footer>
    공용 PC 5대 사용 가능 · 바탕화면 바로가기 저장 추천
  </footer>

</div>

<!-- 시계 -->
<script>
function tick(){
  const d = new Date();
  document.getElementById('date').textContent =
    d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('time').textContent =
    d.toLocaleTimeString('ko-KR');
}
setInterval(tick,1000);
tick();
</script>

</body>
</html>
