<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트수업 바로가기</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#38bdf8);
  min-height:100vh;
  color:#fff;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:28px;
}

/* 헤더 */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}

.title{
  font-size:38px;
  font-weight:800;
}

.sub{
  opacity:.9;
}

.clock{
  background:rgba(255,255,255,.12);
  padding:12px 18px;
  border-radius:18px;
  backdrop-filter:blur(8px);
}

/* 카드 */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  margin-top:28px;
}

.card{
  background:rgba(255,255,255,.14);
  padding:22px;
  border-radius:24px;
  text-decoration:none;
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
  transition:.2s;
  border:1px solid rgba(255,255,255,.18);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
}

.emoji{
  font-size:38px;
}

.name{
  font-size:18px;
  font-weight:700;
  margin-top:10px;
}

.desc{
  opacity:.85;
  margin-top:8px;
}

footer{
  text-align:center;
  margin-top:30px;
  opacity:.85;
}
</style>
</head>

<body>

<div class="wrap">

  <!-- 헤더 -->
  <div class="header">
    <div>
      <div class="title">🏫 스마트수업 바로가기</div>
      <div class="sub">수업 자료 · 영상 모음</div>
    </div>

    <div class="clock">
      <div id="date"></div>
      <div id="time" style="font-size:28px;font-weight:800"></div>
    </div>
  </div>

  <!-- 카드 -->
  <div class="grid">

    <a class="card" href="https://view.genially.com/69e986950abadc2446c7d65c" target="_blank">
      <div class="emoji">🎵</div>
      <div class="name">뮤직마스터</div>
      <div class="desc">음악 퀴즈 게임</div>
    </a>

    <a class="card" href="https://view.genially.com/69e9835d4100ff98ecb8aaf4" target="_blank">
      <div class="emoji">🪐</div>
      <div class="name">태양계 미션</div>
      <div class="desc">과학 게임</div>
    </a>

    <a class="card" href="https://view.genially.com/69e9a1944100ff98ecc42c43" target="_blank">
      <div class="emoji">🏛️</div>
      <div class="name">박물관 프로젝트</div>
      <div class="desc">사회 활동</div>
    </a>

    <a class="card" href="https://www.google.com" target="_blank">
      <div class="emoji">🔎</div>
      <div class="name">검색</div>
      <div class="desc">빠른 자료 찾기</div>
    </a>

    <a class="card" href="https://edugames.uz/game/arqon/" target="_blank">
      <div class="emoji">🧮</div>
      <div class="name">수학 게임</div>
      <div class="desc">줄다리기 수학</div>
    </a>

    <a class="card" href="https://quickdraw.withgoogle.com/?locale=ko" target="_blank">
      <div class="emoji">✏️</div>
      <div class="name">Quick, Draw!</div>
      <div class="desc">AI 그림 게임</div>
    </a>

    <a class="card" href="https://artsandculture.google.com/experiment/blob-beats/ZgF_e3-CO-iRPw?hl=en" target="_blank">
      <div class="emoji">🎹</div>
      <div class="name">Blob Beats</div>
      <div class="desc">리듬 게임</div>
    </a>

    <a class="card" href="https://artsandculture.google.com/experiment/blob-opera/AAHWrq360NcGbw?hl=en" target="_blank">
      <div class="emoji">🎵</div>
      <div class="name">Blob Opera</div>
      <div class="desc">오페라 연습</div>
    </a>

    <a class="card" href="https://artsandculture.google.com/experiment/viola-the-bird/nAEJVwNkp-FnrQ" target="_blank">
      <div class="emoji">🎻</div>
      <div class="name">Viola the Bird</div>
      <div class="desc">비올라 더 버드</div>
    </a>

    <a class="card" href="https://youtu.be/0InGD75KGKc?si=asaP2V7mBjg7RXRy" target="_blank">
      <div class="emoji">📺</div>
      <div class="name">2025 일본 교원 방한연수 부천동초 스케치 영상</div>
      <div class="desc">영상</div>
    </a>

    <a class="card" href="https://youtu.be/-jArE2Weg4M?si=8StHVYpfBc5IpMkw" target="_blank">
      <div class="emoji">📺</div>
      <div class="name">안녕 부천동초!1</div>
      <div class="desc">영상</div>
    </a>

    <a class="card" href="https://youtu.be/eG-51mY6cYI?si=N_2L1ErryQupXkeF" target="_blank">
      <div class="emoji">📺</div>
      <div class="name">안녕 부천동초2</div>
      <div class="desc">영상</div>
    </a>

  </div>

  <footer>
    스마트수업 바로가기
  </footer>

</div>

<!-- 시계 -->
<script>
function tick(){
  const d = new Date();
  document.getElementById('date').textContent =
    d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  document.getElementById('time').textContent =
    d.toLocaleTimeString('ko-KR');
}
setInterval(tick,1000);
tick();
</script>

</body>
</html>
